<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antigravity — Grafo de Conhecimento</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --text: #e0e0e0; --dim: #888; --accent: #00d4aa;
    --accent2: #6366f1; --danger: #ef4444; --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
  nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
  nav a { color: var(--dim); text-decoration: none; font-size: 14px; padding: 4px 12px; border-radius: 6px; transition: all 0.2s; }
  nav a:hover, nav a.active { color: var(--text); background: var(--border); }
  nav a.active { color: var(--accent); }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 14px; margin-bottom: 24px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
  .kpi-value { font-size: 32px; font-weight: 700; }
  .kpi-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .kpi-value.green { color: var(--accent); }
  .kpi-value.purple { color: var(--accent2); }
  .kpi-value.yellow { color: var(--warn); }

  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 768px) { .section-grid { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .chart-container { position: relative; height: 280px; }

  #graph-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  #graph-container svg { width: 100%; height: 500px; display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--dim); font-weight: 500; text-transform: uppercase; font-size: 11px; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }

  .node-type-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .generated { text-align: center; color: var(--dim); font-size: 12px; padding: 24px; }
</style>
</head>
<body>
<nav>
  <span class="logo">ANTIGRAVITY</span>
  <a href="index.html">Painel</a>
  <a href="token_economy.html">Tokens</a>
  <a href="decision_radar.html">Decisoes</a>
  <a href="knowledge_graph.html" class="active">Grafo</a>
  <a href="live_proof.html">Prova ao Vivo</a>
</nav>

<div class="container">
  <h1>Grafo de Conhecimento</h1>
  <p class="subtitle">Mapa semantico do codebase — 4.197 entidades extraidas automaticamente</p>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-value purple" id="k-nodes">—</div>
      <div class="kpi-label">Nos (Entidades)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value green" id="k-edges">—</div>
      <div class="kpi-label">Arestas (Relacoes)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value yellow" id="k-density">—</div>
      <div class="kpi-label">Densidade</div>
    </div>
  </div>

  <div id="graph-container">
    <svg id="graph-svg"></svg>
  </div>

  <div class="section-grid">
    <div class="panel">
      <div class="panel-title">Distribuicao por Tipo</div>
      <div class="chart-container">
        <canvas id="chart-types"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Top 20 Entidades por Conexoes</div>
      <div style="overflow-y: auto; max-height: 300px;">
        <table>
          <thead><tr><th>Tipo</th><th>Nome</th><th>Conexoes</th></tr></thead>
          <tbody id="top-nodes-rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="generated" id="generated-at"></div>
</div>

<script>
const TYPE_COLORS = {
  'function': '#00d4aa',
  'class': '#6366f1',
  'file': '#f59e0b',
  'import': '#ef4444',
  'variable': '#8b5cf6',
  'method': '#06b6d4',
  'module': '#f97316',
};

function getColor(type) { return TYPE_COLORS[type] || '#888'; }

async function loadData() {
  const res = await fetch('data/graph.json');
  const data = await res.json();
  render(data);
}

function render(data) {
  document.getElementById('k-nodes').textContent = data.stats.total_nodes.toLocaleString('pt-BR');
  document.getElementById('k-edges').textContent = data.stats.total_edges.toLocaleString('pt-BR');
  document.getElementById('k-density').textContent = data.stats.density;
  document.getElementById('generated-at').textContent = 'Dados gerados em: ' + data.generated_at.slice(0,16).replace('T',' ');

  // Top nodes table
  const tbody = document.getElementById('top-nodes-rows');
  data.top_nodes.slice(0, 20).forEach(n => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td><span class="node-type-dot" style="background:' + getColor(n.type) + '"></span>' + (n.type||'—') + '</td>'
      + '<td><code>' + n.name + '</code></td>'
      + '<td>' + n.connections + '</td>';
    tbody.appendChild(tr);
  });

  // Type distribution chart
  new Chart(document.getElementById('chart-types'), {
    type: 'doughnut',
    data: {
      labels: data.by_type.slice(0,8).map(t => t.type + ' (' + t.count + ')'),
      datasets: [{
        data: data.by_type.slice(0,8).map(t => t.count),
        backgroundColor: data.by_type.slice(0,8).map(t => getColor(t.type)),
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#888', font: { size: 11 } } } },
    }
  });

  // Force-directed graph (sample edges)
  renderGraph(data.sample_edges, data.top_nodes.slice(0, 30));
}

function renderGraph(edges, topNodes) {
  const svg = d3.select('#graph-svg');
  const width = svg.node().parentElement.clientWidth;
  const height = 500;

  svg.attr('viewBox', [0, 0, width, height]);

  // Build nodes from edges
  const nodeSet = new Set();
  edges.forEach(e => { nodeSet.add(e.source); nodeSet.add(e.target); });
  const nodes = Array.from(nodeSet).map(name => {
    const top = topNodes.find(t => t.name === name);
    return { id: name, type: top ? top.type : 'unknown', connections: top ? top.connections : 1 };
  });

  const links = edges.map(e => ({ source: e.source, target: e.target, relation: e.relation }));

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-40))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(12));

  const link = svg.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', '#1e1e2e')
    .attr('stroke-width', 0.5);

  const node = svg.append('g')
    .selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r', d => Math.min(3 + Math.sqrt(d.connections), 12))
    .attr('fill', d => getColor(d.type))
    .attr('opacity', 0.8)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('title').text(d => d.id + ' (' + d.type + ', ' + d.connections + ' conexoes)');

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node
      .attr('cx', d => d.x).attr('cy', d => d.y);
  });
}

loadData();
</script>
</body>
</html>
