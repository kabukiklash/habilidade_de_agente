<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY V3 - Protocol Guardian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .portal-card { background: #16161a; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #ffffff05; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 500px; }
        .neon-btn { background: #00f2ff; color: black; font-weight: 800; padding: 15px 30px; border-radius: 10px; text-decoration: none; display: inline-block; transition: all 0.3s; margin-top: 20px; }
        .neon-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .warning-box { background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #ff0055; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="app" class="portal-card">
        <h1 style="color: #00f2ff;">🛡️ SENTRY V3</h1>
        <p class="text-muted">GenesisCore Telemetry Node</p>
        <hr style="border-color: #333;">
        
        <div id="content">
            <p>O sistema Sentry V3 está operacional.</p>
            <a href="SENTRY/index.php" class="neon-btn">ACESSAR PAINEL SENTRY V3</a>
        </div>
    </div>

    <script>
        // Protocol Guardian - Nível Militar
        if (window.location.protocol === 'file:') {
            const app = document.getElementById('app');
            app.innerHTML = `
                <h1 style="color: #ff0055;">⚠️ PROTOCOLO INVÁLIDO</h1>
                <p class="text-muted">Acesso Negado via Filesystem</p>
                <div class="warning-box">
                    <strong>Por que estou vendo isso?</strong><br>
                    Você tentou abrir o Sentry diretamente pelo Explorer (file://).<br><br>
                    <strong>Como corrigir:</strong><br>
                    1. Certifique-se que o XAMPP/Docker está ligado.<br>
                    2. Acesse via URL do servidor (ex: http://localhost/v2/...).<br>
                    3. PHP exige um interpretador ativo para renderizar o UX.
                </div>
                <p class="mt-4 small text-muted">Protocol Guardian v3.5 Active</p>
            `;
        }
    </script>
</body>
</html>
